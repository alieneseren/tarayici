name: Build Visionary Navigator

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    - name: Build macOS App
      run: pyinstaller build_macos.spec --clean
    - name: Upload macOS App Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VisionaryNavigator-macOS
        path: dist/Visionary Navigator.app

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    - name: Build Windows Exe
      run: pyinstaller build_windows.spec --clean
    - name: Upload Windows Exe Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VisionaryNavigator-Windows
        path: dist/Visionary Navigator.exe
